{% extends "base.html" %}

{% block title %}Register — ResumeAI{% endblock %}

{% block content %}
<div class="glass-container form-card" style="margin: 0 auto;">
    <h1 class="form-title">Create Account</h1>
    <p class="form-subtitle">Register to unlock AI-powered resume analysis</p>
    
    <form action="{{ url_for('register') }}" method="POST">
        <div class="form-group">
            <label for="username" class="form-label">Username</label>
            <input type="text" id="username" name="username" class="form-control" placeholder="choose a username" required autocomplete="username">
        </div>

        <div class="form-group">
            <label for="email" class="form-label">Email Address</label>
            <input type="email" id="email" name="email" class="form-control" placeholder="yourname@example.com" required autocomplete="email">
        </div>
        
        <div class="form-group">
            <label for="password" class="form-label">Password</label>
            <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" required autocomplete="new-password">
        </div>
        
        <button type="submit" class="btn-primary">
            Get Started <i class="fa-solid fa-user-plus"></i>
        </button>
    </form>
    
    <div style="display: flex; align-items: center; margin: 20px 0;">
        <div style="flex: 1; height: 1px; background: var(--border-glass);"></div>
        <span style="padding: 0 10px; color: var(--text-muted); font-size: 0.85rem;">or</span>
        <div style="flex: 1; height: 1px; background: var(--border-glass);"></div>
    </div>

    <div style="display: flex; gap: 10px; margin-top: 5px; margin-bottom: 20px;">
        <button type="button" id="google-login-btn" class="nav-btn-outline" style="flex: 1; display: flex; align-items: center; justify-content: center; gap: 8px; padding: 12px; font-size: 0.9rem; border-radius: 12px; cursor: pointer; transition: var(--transition-smooth); background: rgba(255, 255, 255, 0.015);">
            <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google logo" style="width: 16px; height: 16px;">
            Google
        </button>

        <button type="button" id="facebook-login-btn" class="btn-facebook" style="flex: 1; display: flex; align-items: center; justify-content: center; gap: 8px; padding: 12px; font-size: 0.9rem; border-radius: 12px; cursor: pointer;">
            <i class="fa-brands fa-facebook" style="font-size: 1.1rem;"></i>
            Facebook
        </button>
    </div>
    
    <div class="form-footer">
        Already have an account? <a href="{{ url_for('login') }}">Login here</a>
    </div>
</div>
{% endblock %}
