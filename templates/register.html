{% extends "base.html" %}

{% block title %}Register — ResumeAI{% endblock %}

{% block content %}
<div class="glass-container form-card" style="margin: 0 auto; animation: pageEntrance 0.4s ease-out;">
    <h1 class="form-title">Create Account</h1>
    <p class="form-subtitle">Register to unlock AI-powered resume analysis.</p>
    
    <form action="{{ url_for('register') }}" method="POST">
        <!-- Username Input -->
        <div class="form-group">
            <label for="username" class="form-label">Username</label>
            <input type="text" id="username" name="username" class="form-control" placeholder="choose a username (e.g. dhanush)" required autocomplete="username">
        </div>

        <!-- Email Input -->
        <div class="form-group">
            <label for="email" class="form-label">Email Address</label>
            <input type="email" id="email" name="email" class="form-control" placeholder="yourname@example.com" required autocomplete="email">
        </div>

        <!-- Mobile Number Input -->
        <div class="form-group">
            <label for="mobile_number" class="form-label">Mobile Number</label>
            <input type="text" id="mobile_number" name="mobile_number" class="form-control" placeholder="+91 XXXXX XXXXX" required autocomplete="tel">
        </div>
        
        <!-- Password Input -->
        <div class="form-group">
            <label for="password" class="form-label">Password</label>
            <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" required autocomplete="new-password">
        </div>
        
        <!-- Submit Button -->
        <button type="submit" class="btn-primary" style="margin-top: 10px;">
            Register Account <i class="fa-solid fa-user-plus"></i>
        </button>
    </form>
    
    <div class="form-footer" style="margin-top: 25px;">
        Already have an account? <a href="{{ url_for('login') }}">Login here</a>
    </div>
</div>
{% endblock %}
