{% extends "base.html" %}

{% block title %}Register — ResumeAI{% endblock %}

{% block content %}
<div class="glass-container form-card" style="margin: 0 auto;">
    <h1 class="form-title">Create Account</h1>
    <p class="form-subtitle">Register to unlock AI-powered resume analysis</p>
    
    <form action="{{ url_for('register') }}" method="POST">
        <div class="form-group">
            <label for="username" class="form-label">Username</label>
            <input type="text" id="username" name="username" class="form-control" placeholder="choose a username" required autocomplete="username">
        </div>

        <div class="form-group">
            <label for="email" class="form-label">Email Address</label>
            <input type="email" id="email" name="email" class="form-control" placeholder="yourname@example.com" required autocomplete="email">
        </div>
        
        <div class="form-group">
            <label for="password" class="form-label">Password</label>
            <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" required autocomplete="new-password">
        </div>
        
        <button type="submit" class="btn-primary">
            Get Started <i class="fa-solid fa-user-plus"></i>
        </button>
    </form>
    
    <div class="form-footer">
        Already have an account? <a href="{{ url_for('login') }}">Login here</a>
    </div>
</div>
{% endblock %}
