{% extends "base.html" %}

{% block title %}Login — ResumeAI{% endblock %}

{% block content %}
<div class="glass-container form-card" style="margin: 0 auto; animation: pageEntrance 0.4s ease-out;">
    <h1 class="form-title">Dhanush's AI Resume Analyzer</h1>
    <p class="form-subtitle">Enter your registered email and password to log in.</p>
    
    <form action="{{ url_for('login') }}" method="POST">
        <!-- Email Input -->
        <div class="form-group">
            <label for="email" class="form-label">Email Address</label>
            <input type="email" id="email" name="email" class="form-control" placeholder="yourname@example.com" required autocomplete="email">
        </div>
        
        <!-- Password Input -->
        <div class="form-group">
            <label for="password" class="form-label">Password</label>
            <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" required autocomplete="current-password">
        </div>
        
        <!-- Submit Button -->
        <button type="submit" class="btn-primary" style="margin-top: 10px;">
            Access Dashboard <i class="fa-solid fa-arrow-right-to-bracket"></i>
        </button>
    </form>
    
    <div class="form-footer" style="margin-top: 25px;">
        Don't have an account? <a href="{{ url_for('register') }}">Create one here</a>
    </div>
</div>
{% endblock %}
