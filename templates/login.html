{% extends "base.html" %}

{% block title %}Login — ResumeAI{% endblock %}

{% block content %}
<div class="glass-container form-card" style="margin: 0 auto;">
    <h1 class="form-title">Welcome Back</h1>
    <p class="form-subtitle">Login to decode your resume & find matching jobs</p>
    
    <form action="{{ url_for('login') }}" method="POST">
        <div class="form-group">
            <label for="email" class="form-label">Email Address</label>
            <input type="email" id="email" name="email" class="form-control" placeholder="enter your email" required autocomplete="email">
        </div>
        
        <div class="form-group">
            <label for="password" class="form-label">Password</label>
            <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" required autocomplete="current-password">
        </div>
        
        <button type="submit" class="btn-primary">
            Sign In <i class="fa-solid fa-arrow-right-to-bracket"></i>
        </button>
    </form>

    <div style="display: flex; align-items: center; margin: 20px 0;">
        <div style="flex: 1; height: 1px; background: var(--border-glass);"></div>
        <span style="padding: 0 10px; color: var(--text-muted); font-size: 0.85rem;">or</span>
        <div style="flex: 1; height: 1px; background: var(--border-glass);"></div>
    </div>

    <button type="button" id="google-login-btn" class="nav-btn-outline" style="width: 100%; display: flex; align-items: center; justify-content: center; gap: 10px; padding: 12px; font-size: 0.95rem; border-radius: 12px; cursor: pointer; transition: var(--transition-smooth); background: rgba(255, 255, 255, 0.015);">
        <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google logo" style="width: 18px; height: 18px;">
        Sign in with Google
    </button>
    
    <div class="form-footer" style="margin-top: 25px;">
        Don't have an account? <a href="{{ url_for('register') }}">Create one here</a>
    </div>
</div>

<script>
    window.GOOGLE_CLIENT_ID = "{{ google_client_id }}";
</script>
{% endblock %}
